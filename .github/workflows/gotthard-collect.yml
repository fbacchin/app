name: Collect Gotthard history

# GitHub esegue i cron "best effort" e ritarda anche di ore quelli frequenti.
# Strategia: run lunghi che campionano in loop ogni 5 minuti per ~3 ore e
# committano a ogni campione; il gruppo di concorrenza incatena i run in coda.
# Sync col remoto via fetch+reset (mai pull/rebase: un merge conflittuale
# aveva committato marcatori <<<<<<< dentro il JSON corrompendolo).
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gotthard-collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 178
    steps:
      - uses: actions/checkout@v4

      - name: Sample every 5 minutes for ~3 hours
        env:
          OTD_API_KEY: ${{ secrets.OTD_API_KEY }}
        run: |
          git config user.name "gottardo-bot"
          git config user.email "actions@users.noreply.github.com"
          for i in $(seq 1 34); do
            git fetch origin main && git reset --hard origin/main
            if python3 gotthard/collect.py; then
              git add gotthard/data/history.json gotthard/data/latest.json
              git diff --cached --quiet || git commit -m "gotthard sample $(date -u +%FT%TZ)"
              git push origin main || echo "push fallito, campione perso: riprovo al prossimo giro"
            fi
            [ "$i" -lt 34 ] && sleep 300
          done
